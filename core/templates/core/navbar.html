<style>
  body {
    font-family: "Lato", sans-serif;
    margin: 0;
    padding: 0;
    background-color: #f4f4f4; /* خلفية الصفحة */
  }

  a {
    text-decoration: none;
  }

  /* تصميم القائمة الجانبية */
  .sidenav {
    height: 100%;
    width: 0;
    position: fixed;
    z-index: 1;
    top: 0;
    left: 0;
    background-color: #111;
    overflow-x: hidden;
    transition: 0.5s;
    padding-top: 60px;
  }

  .sidenav a {
    padding: 12px 25px;
    text-decoration: none;
    font-size: 1.5rem;
    color: #818181;
    display: flex;
    align-items: center;
    transition: 0.3s;
  }

  .sidenav a:first-child {
    padding: 4px 8px;
  }

  .sidenav a i {
    margin-right: 15px;
    font-size: 1.8rem;
  }

  .sidenav a:hover {
    background-color: rgb(47, 51, 54);
    border-radius: 9999px;
    color: #fff;
  }

  .sidenav .closebtn {
    position: absolute;
    top: 0;
    right: 25px;
    font-size: 36px;
    margin-left: 50px;
    color: #fff;
  }

  /* صفحة المحتوى الرئيسي */
  #main {
    transition: margin-left .5s;
    padding: 16px;
  }

  #nav {
    font-size: 30px;
    cursor: pointer;
    color: #111;
    background-color: #f4f4f4;
    padding: 10px;
    border-radius: 5px;
    display: inline-block;
  }

  /* تأثير عند التمرير على أيقونة القائمة */
  #nav:hover {
    background-color: #ddd;
  }

  /* ترويسة الصفحة */
  .mt-1 h1 {
    font-size: 2.5rem;
    color: #333;
  }

  .mt-1 .text-center {
    margin-top: 20px;
  }

  /* تحسين التنسيق عند تغيير حجم الشاشة */
  @media screen and (max-height: 450px) {
    .sidenav { padding-top: 15px; }
    .sidenav a { font-size: 18px; }
  }
</style>

<div id="mySidenav" class="sidenav">
  <a href="javascript:void(0)" class="closebtn" onclick="closeNav()">&times;</a>
  <a href="{% url 'homepage' %}"><i class="fas fa-home"></i> Home</a>
  <a href="{% url 'logincms' %}"><i class="fa-solid fa-chalkboard-user"></i> Teacher Portal</a>
  <a href="{% url 'chatbot_view' %}"><i class="fa-solid fa-chalkboard-user"></i>chat bot</a> 
  
</div>

<div id="main">
  <span id="nav" onclick="openNav()">&#9776; Menu</span>
  <div class="mt-1 text-center">
    <h1 class="display-5">E-<span class="text-danger">Alahram</span> <i class="fas fa-school"></i></h1>
  </div>
</div>

<script>
  function openNav() {
    document.getElementById("mySidenav").style.width = "250px";
    document.getElementById("main").style.marginLeft = "250px";
    document.getElementById("nav").style.display = "none";
  }

  function closeNav() {
    document.getElementById("mySidenav").style.width = "0";
    document.getElementById("main").style.marginLeft = "0";
    document.getElementById("nav").style.display = "inline-block";
  }
</script>
